name: "Build all Fink Docker images"

on:
  push:
    branches: [main, 1096-add-fink-broker-dockerfile-for-k8s]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # K8s Images
  k8s-ztf-science:
    uses: ./.github/workflows/build-image-template.yml
    with:
      target: k8s
      survey: ztf
      suffix: science
      artifact_name: k8s-ztf-science
      ciux_suffix: science-ztf
    secrets:
      gitlab_registry_username: ${{ secrets.GITLAB_REGISTRY_USERNAME }}
      gitlab_registry_token: ${{ secrets.GITLAB_REGISTRY_TOKEN }}

  k8s-ztf-noscience:
    uses: ./.github/workflows/build-image-template.yml
    with:
      target: k8s
      survey: ztf
      suffix: noscience
      artifact_name: k8s-ztf-noscience
      ciux_suffix: noscience-ztf
    secrets:
      gitlab_registry_username: ${{ secrets.GITLAB_REGISTRY_USERNAME }}
      gitlab_registry_token: ${{ secrets.GITLAB_REGISTRY_TOKEN }}

  k8s-rubin-science:
    uses: ./.github/workflows/build-image-template.yml
    with:
      target: k8s
      survey: rubin
      suffix: science
      artifact_name: k8s-rubin-science
      ciux_suffix: science-rubin
    secrets:
      gitlab_registry_username: ${{ secrets.GITLAB_REGISTRY_USERNAME }}
      gitlab_registry_token: ${{ secrets.GITLAB_REGISTRY_TOKEN }}

  k8s-rubin-noscience:
    uses: ./.github/workflows/build-image-template.yml
    with:
      target: k8s
      survey: rubin
      suffix: noscience
      artifact_name: k8s-rubin-noscience
      ciux_suffix: noscience-rubin
    secrets:
      gitlab_registry_username: ${{ secrets.GITLAB_REGISTRY_USERNAME }}
      gitlab_registry_token: ${{ secrets.GITLAB_REGISTRY_TOKEN }}

  # Sentinel Images
  sentinel-ztf:
    uses: ./.github/workflows/build-image-template.yml
    with:
      target: sentinel
      survey: ztf
      suffix: ""
      artifact_name: sentinel-ztf
      ciux_suffix: sentinel-ztf
    secrets:
      gitlab_registry_username: ${{ secrets.GITLAB_REGISTRY_USERNAME }}
      gitlab_registry_token: ${{ secrets.GITLAB_REGISTRY_TOKEN }}

  sentinel-rubin:
    uses: ./.github/workflows/build-image-template.yml
    with:
      target: sentinel
      survey: rubin
      suffix: ""
      artifact_name: sentinel-rubin
      ciux_suffix: sentinel-rubin
    secrets:
      gitlab_registry_username: ${{ secrets.GITLAB_REGISTRY_USERNAME }}
      gitlab_registry_token: ${{ secrets.GITLAB_REGISTRY_TOKEN }}

  # Summary
  summary:
    name: "Build Summary"
    runs-on: ubuntu-latest
    if: always()
    needs: [k8s-ztf-science, k8s-ztf-noscience, k8s-rubin-science, k8s-rubin-noscience, sentinel-ztf, sentinel-rubin]
    steps:
      - name: Summary
        run: |
          echo "## 🚀 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|---------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| K8s ZTF Science | ${{ needs.k8s-ztf-science.result }} | Build→Scan→Push |" >> $GITHUB_STEP_SUMMARY
          echo "| K8s ZTF NoScience | ${{ needs.k8s-ztf-noscience.result }} | Build→Scan→Push |" >> $GITHUB_STEP_SUMMARY
          echo "| K8s Rubin Science | ${{ needs.k8s-rubin-science.result }} | Build→Scan→Push |" >> $GITHUB_STEP_SUMMARY
          echo "| K8s Rubin NoScience | ${{ needs.k8s-rubin-noscience.result }} | Build→Scan→Push |" >> $GITHUB_STEP_SUMMARY
          echo "| Sentinel ZTF | ${{ needs.sentinel-ztf.result }} | Build→Scan→Push |" >> $GITHUB_STEP_SUMMARY
          echo "| Sentinel Rubin | ${{ needs.sentinel-rubin.result }} | Build→Scan→Push |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count results
          SUCCESS_COUNT=0
          TOTAL_COUNT=6

          for result in "${{ needs.k8s-ztf-science.result }}" "${{ needs.k8s-ztf-noscience.result }}" "${{ needs.k8s-rubin-science.result }}" "${{ needs.k8s-rubin-noscience.result }}" "${{ needs.sentinel-ztf.result }}" "${{ needs.sentinel-rubin.result }}"; do
            if [[ "$result" == "success" ]]; then
              ((SUCCESS_COUNT++))
            fi
          done

          echo "### 📊 Results: ${SUCCESS_COUNT}/${TOTAL_COUNT} successful" >> $GITHUB_STEP_SUMMARY

          if [[ $SUCCESS_COUNT -eq $TOTAL_COUNT ]]; then
            echo "✅ All builds completed successfully!" >> $GITHUB_STEP_SUMMARY
          elif [[ $SUCCESS_COUNT -gt 0 ]]; then
            echo "⚠️ Partial success: $SUCCESS_COUNT builds completed, $((TOTAL_COUNT - SUCCESS_COUNT)) failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ All builds failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi