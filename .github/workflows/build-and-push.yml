name: "Build, scan and push Fink Docker images"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CIUX_VERSION: v0.0.5-rc0
  REGISTRY: gitlab-registry.in2p3.fr

jobs:
  build-matrix:
    name: Build ${{ matrix.target }} - ${{ matrix.survey }}${{ matrix.suffix && format(' ({0})', matrix.suffix) || '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # K8s builds
          - target: k8s
            survey: ztf
            suffix: science
          - target: k8s
            survey: ztf
            suffix: noscience
          - target: k8s
            survey: rubin
            suffix: science
          - target: k8s
            survey: rubin
            suffix: noscience
          # Sentinel builds
          - target: sentinel
            survey: ztf
            suffix: ""
          - target: sentinel
            survey: rubin
            suffix: ""
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21.4'

      - name: Install ciux
        run: go install github.com/k8s-school/ciux@"${{ env.CIUX_VERSION }}"

      - name: Build ${{ matrix.target }} image for ${{ matrix.survey }}${{ matrix.suffix && format(' ({0})', matrix.suffix) || '' }}
        run: |
          mkdir -p $HOME/.ciux
          if [ "${{ matrix.target }}" = "k8s" ]; then
            ./build-images.sh -t k8s -i ${{ matrix.survey }} -s ${{ matrix.suffix }}
          else
            ./build-images.sh -t sentinel -i ${{ matrix.survey }}
          fi

      - name: Export image information
        id: export
        run: |
          mkdir -p artifacts
          if [ "${{ matrix.target }}" = "k8s" ]; then
            SUFFIX="${{ matrix.suffix }}-${{ matrix.survey }}"
          else
            SUFFIX="sentinel-${{ matrix.survey }}"
          fi
          $(ciux get image --check $PWD --suffix "$SUFFIX" --env)
          if [ $CIUX_BUILD = true ]; then
              echo "Export $CIUX_IMAGE_URL to Github artifact store"
              docker save "$CIUX_IMAGE_URL" > artifacts/image-${{ matrix.target }}-${{ matrix.survey }}-${{ matrix.suffix }}.tar
          else
            echo "Using existing image $CIUX_IMAGE_URL"
            touch artifacts/empty-${{ matrix.target }}-${{ matrix.survey }}-${{ matrix.suffix }}
          fi
          echo "IMAGE=$CIUX_IMAGE_URL" >> "$GITHUB_OUTPUT"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-artifact-${{ matrix.target }}-${{ matrix.survey }}-${{ matrix.suffix }}
          path: artifacts

  security-scan:
    name: Security scan ${{ matrix.target }} - ${{ matrix.survey }}${{ matrix.suffix && format(' ({0})', matrix.suffix) || '' }}
    runs-on: ubuntu-latest
    needs: build-matrix
    permissions:
      security-events: write
    strategy:
      matrix:
        include:
          # K8s builds
          - target: k8s
            survey: ztf
            suffix: science
          - target: k8s
            survey: ztf
            suffix: noscience
          - target: k8s
            survey: rubin
            suffix: science
          - target: k8s
            survey: rubin
            suffix: noscience
          # Sentinel builds
          - target: sentinel
            survey: ztf
            suffix: ""
          - target: sentinel
            survey: rubin
            suffix: ""
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-artifact-${{ matrix.target }}-${{ matrix.survey }}-${{ matrix.suffix }}
          path: artifacts

      - name: Load image and run security scan
        run: |
          if [ -f artifacts/image-${{ matrix.target }}-${{ matrix.survey }}-${{ matrix.suffix }}.tar ]; then
            echo "Loading image from archive"
            docker load --input artifacts/image-${{ matrix.target }}-${{ matrix.survey }}-${{ matrix.suffix }}.tar
            IMAGE_NAME=$(docker images --format "{{.Repository}}:{{.Tag}}" | head -1)
            echo "Scanning image: $IMAGE_NAME"

            # Run Trivy scan
            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
              -v $PWD:/tmp/trivy aquasec/trivy:latest image \
              --format sarif --output /tmp/trivy/trivy-results.sarif \
              "$IMAGE_NAME"
          else
            echo "No new image to scan (using existing image)"
            # Create empty SARIF for consistency
            echo '{"version":"2.1.0","runs":[]}' > trivy-results.sarif
          fi

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  push-images:
    name: Push images to registry
    runs-on: ubuntu-latest
    needs: [build-matrix, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        include:
          # K8s builds
          - target: k8s
            survey: ztf
            suffix: science
          - target: k8s
            survey: ztf
            suffix: noscience
          - target: k8s
            survey: rubin
            suffix: science
          - target: k8s
            survey: rubin
            suffix: noscience
          # Sentinel builds
          - target: sentinel
            survey: ztf
            suffix: ""
          - target: sentinel
            survey: rubin
            suffix: ""
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21.4'

      - name: Install ciux
        run: go install github.com/k8s-school/ciux@"${{ env.CIUX_VERSION }}"

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-artifact-${{ matrix.target }}-${{ matrix.survey }}-${{ matrix.suffix }}
          path: artifacts

      - name: Load and prepare image for push
        run: |
          if [ "${{ matrix.target }}" = "k8s" ]; then
            SUFFIX="${{ matrix.suffix }}-${{ matrix.survey }}"
          else
            SUFFIX="sentinel-${{ matrix.survey }}"
          fi
          $(ciux get image --check $PWD --suffix "$SUFFIX" --env)

          if [ -f artifacts/image-${{ matrix.target }}-${{ matrix.survey }}-${{ matrix.suffix }}.tar ]; then
            echo "Loading image $CIUX_IMAGE_URL from archive"
            docker load --input artifacts/image-${{ matrix.target }}-${{ matrix.survey }}-${{ matrix.suffix }}.tar
            NEW_IMAGE=true
          else
            echo "Using existing image $CIUX_IMAGE_URL"
            NEW_IMAGE=false
          fi
          echo "IMAGE_URL=$CIUX_IMAGE_URL" >> $GITHUB_ENV
          echo "NEW_IMAGE=$NEW_IMAGE" >> $GITHUB_ENV

      - name: Login to GitLab Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GITLAB_REGISTRY_USERNAME }}
          password: ${{ secrets.GITLAB_REGISTRY_TOKEN }}

      - name: Push image to registry
        run: |
          if [ "$NEW_IMAGE" = "true" ]; then
            echo "Pushing new image: $IMAGE_URL"
            docker push "$IMAGE_URL"
          else
            echo "No new image to push for $IMAGE_URL"
          fi

      - name: Clean up local image
        run: |
          if [ "$NEW_IMAGE" = "true" ]; then
            docker rmi "$IMAGE_URL" || true
          fi