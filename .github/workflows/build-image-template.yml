name: "Build, scan and push single Docker image"

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
        description: 'Build target: k8s or sentinel'
      survey:
        required: true
        type: string
        description: 'Survey: ztf or rubin'
      suffix:
        required: false
        type: string
        description: 'Suffix for k8s builds: science or noscience'
        default: ''
      artifact_name:
        required: true
        type: string
        description: 'Unique artifact name for this build'
      ciux_suffix:
        required: true
        type: string
        description: 'CIUX suffix for image naming'
    secrets:
      gitlab_registry_username:
        required: true
      gitlab_registry_token:
        required: true

env:
  CIUX_VERSION: v0.0.7-rc1
  REGISTRY: gitlab-registry.in2p3.fr

jobs:
  build:
    name: "Build ${{ inputs.target }} ${{ inputs.survey }}${{ inputs.suffix && format(' {0}', inputs.suffix) || '' }}"
    runs-on: ubuntu-latest
    outputs:
      success: ${{ steps.build.outcome == 'success' }}
      image-url: ${{ steps.build.outputs.image-url }}
      new-build: ${{ steps.build.outputs.new-build }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Maximize build space
        run: |
          echo "Removing unwanted software... "
          df -h
          sudo rm -rf /usr/share/dotnet
          df -h
          sudo rm -rf /usr/local/lib/android
          df -h
          sudo rm -rf /opt/ghc
          df -h
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h
          docker image prune --all --force
          df -h

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21.4'

      - name: Install ciux
        run: go install github.com/k8s-school/ciux@"${{ env.CIUX_VERSION }}"

      - name: Build image
        id: build
        run: |
          mkdir -p $HOME/.ciux artifacts
          echo "Building ${{ inputs.target }} ${{ inputs.survey }}${{ inputs.suffix }} image..."

          # Build based on target
          if [ "${{ inputs.target }}" = "k8s" ]; then
            if [ -n "${{ inputs.suffix }}" ]; then
              ./build-images.sh -t k8s -i ${{ inputs.survey }} -s ${{ inputs.suffix }} --verbose
            else
              ./build-images.sh -t k8s -i ${{ inputs.survey }} --verbose
            fi
          else
            ./build-images.sh -t sentinel -i ${{ inputs.survey }} --verbose
          fi

          # Export image
          $(ciux get image --check $PWD --suffix "${{ inputs.ciux_suffix }}" --env)
          if [ $CIUX_BUILD = true ]; then
            docker save "$CIUX_IMAGE_URL" > artifacts/${{ inputs.artifact_name }}.tar
          else
            touch artifacts/${{ inputs.artifact_name }}.empty
          fi
          echo "image-url=$CIUX_IMAGE_URL" >> "$GITHUB_OUTPUT"
          echo "new-build=$CIUX_BUILD" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: artifacts

  scan:
    name: "Scan ${{ inputs.target }} ${{ inputs.survey }}${{ inputs.suffix && format(' {0}', inputs.suffix) || '' }}"
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: artifacts

      - name: Security scan
        run: |
          if [ -f artifacts/${{ inputs.artifact_name }}.tar ]; then
            echo "Loading image for scan..."
            docker load --input artifacts/${{ inputs.artifact_name }}.tar
            IMAGE_NAME=$(docker images --format "{{.Repository}}:{{.Tag}}" | head -1)
            echo "Scanning image: $IMAGE_NAME"

            # Run Trivy scan
            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
              -v $PWD:/tmp/output aquasec/trivy:latest image \
              --format sarif --output /tmp/output/trivy-results-${{ inputs.artifact_name }}.sarif \
              "$IMAGE_NAME"
          else
            echo "No new image to scan (using existing image)"
            echo '{"version":"2.1.0","runs":[]}' > trivy-results-${{ inputs.artifact_name }}.sarif
          fi

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results-${{ inputs.artifact_name }}.sarif

  push:
    name: "Push ${{ inputs.target }} ${{ inputs.survey }}${{ inputs.suffix && format(' {0}', inputs.suffix) || '' }}"
    runs-on: ubuntu-latest
    needs: [build, scan]
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: artifacts

      - name: Login to GitLab Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.gitlab_registry_username }}
          password: ${{ secrets.gitlab_registry_token }}

      - name: Push image
        run: |
          if [ -f artifacts/${{ inputs.artifact_name }}.tar ]; then
            IMAGE_NAME=$(docker images --format "{{.Repository}}:{{.Tag}}" | head -1)
            echo "Loading and pushing new image: $IMAGE_NAME"
            docker load --input artifacts/${{ inputs.artifact_name }}.tar
            docker push "$IMAGE_NAME"
          else
            echo "No new image to push (image already exists in registry)"
          fi
